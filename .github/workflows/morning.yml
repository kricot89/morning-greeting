name: 每日早安祝福

on:
  schedule:
    # UTC 23:00 = 北京时间 7:00 (GitHub会延迟10-30分钟)
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 发送早安祝福
        env:
          WEBHOOK: ${{ secrets.WEBHOOK }}
        run: |
          # 设置北京时间
          export TZ='Asia/Shanghai'
          
          # 获取当前月份和日期
          MONTH=$(date +%m)
          DAY=$(date +%d)
          DATE_NUM=$(date +%Y%m%d)
          
          echo "当前北京时间月份: $MONTH"
          echo "当前北京时间日期: $DAY"
          
          # 判断季节 (3-5春, 6-8夏, 9-11秋, 12-2冬)
          if [ "$MONTH" -ge 3 ] && [ "$MONTH" -le 5 ]; then
            SEASON="spring"
            echo "季节: 春天"
          elif [ "$MONTH" -ge 6 ] && [ "$MONTH" -le 8 ]; then
            SEASON="summer"
            echo "季节: 夏天"
          elif [ "$MONTH" -ge 9 ] && [ "$MONTH" -le 11 ]; then
            SEASON="autumn"
            echo "季节: 秋天"
          else
            SEASON="winter"
            echo "季节: 冬天"
          fi
          
          # 获取合肥天气
          WEATHER_JSON=$(curl -s "wttr.in/Hefei?format=j1" 2>/dev/null || echo "")
          
          if [ -n "$WEATHER_JSON" ]; then
            WEATHER_DESC=$(echo "$WEATHER_JSON" | grep -o '"weatherDesc":\[{"value":"[^"]*"' | head -1 | sed 's/.*"value":"//;s/"$//')
            TEMP=$(echo "$WEATHER_JSON" | grep -o '"temp_C":"[0-9]*"' | head -1 | sed 's/.*":"//;s/"$//')
          fi
          
          if [ -z "$WEATHER_DESC" ]; then
            WEATHER_DESC="晴"
            TEMP="20"
          fi
          
          echo "合肥天气: $WEATHER_DESC, 温度: ${TEMP}°C"
          
          # 天气类型判断
          if echo "$WEATHER_DESC" | grep -qi "晴\|Clear\|Sunny"; then
            WEATHER_TYPE="sunny"
          elif echo "$WEATHER_DESC" | grep -qi "雨\|Rain\|Drizzle"; then
            WEATHER_TYPE="rainy"
          elif echo "$WEATHER_DESC" | grep -qi "阴\|Cloud\|Overcast"; then
            WEATHER_TYPE="cloudy"
          elif echo "$WEATHER_DESC" | grep -qi "雪\|Snow"; then
            WEATHER_TYPE="snowy"
          elif echo "$WEATHER_DESC" | grep -qi "雾\|Fog\|Mist"; then
            WEATHER_TYPE="foggy"
          else
            WEATHER_TYPE="sunny"
          fi
          
          # 四季特色祝福（合肥）
          case $SEASON in
            spring)
              SEASON_MSGS=("巢湖之滨 春光烂漫" "庐州春晓 万物复苏" "春风又绿江南岸" "紫蓬山青 春天你好" "合肥的春天 诗意盎然" "油菜花黄 皖中春浓" "春回庐州 万物生长" "淮河两岸 春意融融")
              ;;
            summer)
              SEASON_MSGS=("巢湖夏日 荷香阵阵" "合肥盛夏 热情似火" "夏夜微风 蜀山纳凉" "烈日炎炎 活力满满" "合肥夏天 热情相随" "蝉鸣夏日 青春正好" "高温不退 激情不退" "夏日合肥 活力四射")
              ;;
            autumn)
              SEASON_MSGS=("合肥金秋 收获满满" "庐州秋色 层林尽染" "秋风起 落叶黄" "天鹅湖畔 秋意浓" "合肥的秋 静美如画" "秋高气爽 合肥你好" "银杏金黄 岁月静好" "秋日合肥 温柔以待")
              ;;
            winter)
              SEASON_MSGS=("合肥冬日 温暖在心" "庐州雪景 静谧美好" "冬日暖阳 合肥相伴" "寒风虽冷 温暖相随" "合肥的冬 静待春归" "雪花纷飞 庐州静美" "冬日合肥 温情常在" "傲雪寒梅 合肥冬韵")
              ;;
          esac
          
          # 随机选择季节祝福
          SEASON_IDX=$((RANDOM % ${#SEASON_MSGS[@]}))
          SEASON_MSG="${SEASON_MSGS[$SEASON_IDX]}"
          
          # 天气祝福
          case $WEATHER_TYPE in
            sunny)
              WEATHER_MSGS=("阳光正好 心情灿烂" "晴空万里 好运相随" "阳光洒满 心间温暖" "蓝天白云 岁月静好" "阳光万里 好事发生")
              ;;
            rainy)
              WEATHER_MSGS=("雨天浪漫 诗意生活" "细雨绵绵 温柔时光" "雨声潺潺 岁月静好" "烟雨蒙蒙 诗意盎然" "雨过天晴 美好将至")
              ;;
            cloudy)
              WEATHER_MSGS=("云淡风轻 岁月静好" "阴天也温柔 心情舒畅" "云卷云舒 时光悠然" "舒云漫卷 静待花开" "云层之上 阳光依旧")
              ;;
            snowy)
              WEATHER_MSGS=("银装素裹 童话世界" "雪花飘飘 浪漫时光" "冬日暖阳 雪景如画" "雪后初晴 美好相随" "雪落无声 岁月静好")
              ;;
            foggy)
              WEATHER_MSGS=("烟雨朦胧 诗意江南" "雾里看花 朦胧之美" "雾散云开 好事将至" "如雾如烟 浪漫时光" "雾散日出 光明相随")
              ;;
            *)
              WEATHER_MSGS=("阳光正好 心情灿烂" "晴空万里 好运相随")
              ;;
          esac
          
          WEATHER_IDX=$((RANDOM % ${#WEATHER_MSGS[@]}))
          WEATHER_MSG="${WEATHER_MSGS[$WEATHER_IDX]}"
          
          # 365天祝福语（取模选择）
          DAY_NUM=$((10#$DAY))
          BASE_MSGS=(
            "云开日出 万事可期" "朝朝平安 日日欢喜" "春随晨起 福伴朝夕" "人勤春早 人随春好"
            "阳光正好 梦想起航" "清晨微光 好事将近" "春风十里 不如早起" "心向光明 步步生花"
            "岁月静好 微笑向暖" "时光不语 静待花开" "万物可爱 人间值得" "保持热爱 奔赴山海"
            "日有小暖 岁有小安" "一路向阳 温暖相随" "微笑前行 好运相随" "清晨问候 温暖人心"
            "美好的一天 从心开始" "每一天都值得期待" "新的一天 新的开始" "时光清浅 岁月静好"
            "阳光正好 微风不燥" "心有繁星 沐光而行" "晨光微露 万物苏醒" "清风徐来 水波不兴"
            "春暖花开 奔赴热爱" "星河灿烂 逐梦前行" "阳光温柔 万物可爱" "岁月如歌 静待花开"
            "晨起看花 夜来听雨" "云淡风轻 岁月静好" "时光流转 美好相随" "日出有盼 日落有念"
            "心怀温暖 遇见美好" "与光同尘 与时舒卷" "心有暖阳 何惧沧桑" "晨光破晓 希望相随"
            "万物生长 各自尊贵" "温柔半两 从容一生" "阳光万里 鲜花盛开" "心之所向 素履以往"
            "生如夏花 绚烂绽放" "晨风有信 未来可期" "光而不耀 静水流深" "且听风吟 静待花开"
            "繁星入梦 清晨有光" "心怀宇宙 也敬日常" "晨光作序 美好相迎" "时光温柔 岁月无恙"
          )
          BASE_IDX=$((DAY_NUM % ${#BASE_MSGS[@]}))
          BASE_MSG="${BASE_MSGS[$BASE_IDX]}"
          
          # 组合最终消息
          FINAL_MSG="🌅 早安！$BASE_MSG | $SEASON_MSG | 合肥$WEATHER_MSG"
          
          echo "发送消息: $FINAL_MSG"
          
          # 发送到飞书
          curl -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\": \"text\", \"content\": {\"text\": \"$FINAL_MSG\"}}"
