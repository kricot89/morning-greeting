name: 每日早安祝福

on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 获取天气和发送祝福
        env:
          WEBHOOK: ${{ secrets.WEBHOOK }}
        run: |
          # 获取日期
          DATE=$(date +%Y%m%d)
          SEED=$((10#$DATE))
          
          # 获取天气 (使用 wttr.in)
          WEATHER=$(curl -s "wttr.in/?format=%c%t" 2>/dev/null || echo "☀️ 20°C")
          
          # 解析天气和温度
          TEMP=$(echo "$WEATHER" | grep -oE '[0-9]+' | head -1)
          if [ -z "$TEMP" ]; then
            TEMP=20
          fi
          
          # 判断季节 (3-5春, 6-8夏, 9-11秋, 12-2冬)
          MONTH=$(date +%m)
          if [ "$MONTH" -ge "03" ] && [ "$MONTH" -le "05" ]; then
            SEASON="spring"
          elif [ "$MONTH" -ge "06" ] && [ "$MONTH" -le "08" ]; then
            SEASON="summer"
          elif [ "$MONTH" -ge "09" ] && [ "$MONTH" -le "11" ]; then
            SEASON="autumn"
          else
            SEASON="winter"
          fi
          
          # 晴天
          if echo "$WEATHER" | grep -qi "sun\|☀️\|clear"; then
            WEATHER_TYPE="sunny"
          # 雨天
          elif echo "$WEATHER" | grep -qi "rain\|🌧\|drizzle"; then
            WEATHER_TYPE="rainy"
          # 阴天
          elif echo "$WEATHER" | grep -qi "cloud\|☁️\|overcast"; then
            WEATHER_TYPE="cloudy"
          # 雪天
          elif echo "$WEATHER" | grep -qi "snow\|❄️"; then
            WEATHER_TYPE="snowy"
          # 雾天
          elif echo "$WEATHER" | grep -qi "fog\|🌫"; then
            WEATHER_TYPE="foggy"
          else
            WEATHER_TYPE="sunny"
          fi
          
          # 根据天气类型选择合适的祝福语
          declare -a WEATHER_GREETINGS
          
          # 晴天祝福
          WEATHER_GREETINGS=(
            "阳光正好 心情灿烂"
            "晴空万里 好运相随"
            "阳光洒满 心间温暖"
            "蓝天白云 岁月静好"
            "阳光万里 好事发生"
            "晴朗天空 梦想起航"
            "阳光灿烂 笑容相随"
            "风和日丽 美好的一天"
            "阳光正好 微风不燥"
            "晴空万里 快乐相随"
          )
          
          # 雨天祝福
          RAINY_GREETINGS=(
            "雨天浪漫 诗意生活"
            "细雨绵绵 温柔时光"
            "雨声潺潺 岁月静好"
            "烟雨蒙蒙 诗意盎然"
            "雨过天晴 美好将至"
            "听雨时光 静心生活"
            "雨润万物 生机勃勃"
            "雨天也可爱 心情美丽"
            "雨声入眠 岁月静好"
            "雨后彩虹 惊喜相随"
          )
          
          # 阴天祝福
          CLOUDY_GREETINGS=(
            "云淡风轻 岁月静好"
            "阴天也温柔 心情舒畅"
            "云卷云舒 时光悠然"
            "舒云漫卷 静待花开"
            "阴天好眠 精神满满"
            "云淡如画 心情如诗"
            "阴天无妨 快乐相随"
            "云层之上 阳光依旧"
            "阴天也是好天气"
            "静享阴天 岁月静好"
          )
          
          # 雪天祝福
          SNOWY_GREETINGS=(
            "银装素裹 童话世界"
            "雪花飘飘 浪漫时光"
            "冬日暖阳 雪景如画"
            "雪后初晴 美好相随"
            "冰雪聪明 智慧相随"
            "雪落无声 岁月静好"
            "银白世界 纯净心灵"
            "雪天浪漫 温暖相随"
            "踏雪寻梅 诗意生活"
            "雪融春来 好事将近"
          )
          
          # 雾天祝福
          FOGGY_GREETINGS=(
            "烟雨朦胧 诗意江南"
            "雾里看花 朦胧之美"
            "雾散云开 好事将至"
            "如雾如烟 浪漫时光"
            "雾中有晴 心怀希望"
            "迷雾重重 终有出路"
            "雾散日出 光明相随"
            "云雾缭绕 仙境一般"
            "雾朦胧 情真切"
            "雾去春来 美好相迎"
          )
          
          # 选择天气祝福
          if [ "$WEATHER_TYPE" == "sunny" ]; then
            idx=$((RANDOM % ${#WEATHER_GREETINGS[@]}))
            WEATHER_MSG="${WEATHER_GREETINGS[$idx]}"
          elif [ "$WEATHER_TYPE" == "rainy" ]; then
            idx=$((RANDOM % ${#RAINY_GREETINGS[@]}))
            WEATHER_MSG="${RAINY_GREETINGS[$idx]}"
          elif [ "$WEATHER_TYPE" == "cloudy" ]; then
            idx=$((RANDOM % ${#CLOUDY_GREETINGS[@]}))
            WEATHER_MSG="${CLOUDY_GREETINGS[$idx]}"
          elif [ "$WEATHER_TYPE" == "snowy" ]; then
            idx=$((RANDOM % ${#SNOWY_GREETINGS[@]}))
            WEATHER_MSG="${SNOWY_GREETINGS[$idx]}"
          elif [ "$WEATHER_TYPE" == "foggy" ]; then
            idx=$((RANDOM % ${#FOGGY_GREETINGS[@]}))
            WEATHER_MSG="${FOGGY_GREETINGS[$idx]}"
          else
            WEATHER_MSG="阳光正好 心情灿烂"
          fi
          
