name: Daily AI News
on:
  workflow_dispatch:
  schedule:
    - cron: '30 22 * * *'
jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and send news
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python3 << 'EOF'
          import json
          import urllib.request
          import os
          from xml.etree import ElementTree as ET
          
          def fetch_36kr_news():
              try:
                  url = "https://www.36kr.com/feed-newsflash"
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=10) as response:
                      content = response.read().decode('utf-8')
                  
                  root = ET.fromstring(content)
                  items = root.findall('.//item')
                  
                  news_list = []
                  for item in items[:10]:
                      title_elem = item.find('title')
                      link_elem = item.find('link')
                      if title_elem is not None and link_elem is not None:
                          title = title_elem.text or ""
                          link = link_elem.text or ""
                          if title and link:
                              news_list.append({'title': title, 'url': link})
                  
                  return news_list
              except Exception as e:
                  print(f"Error: {e}")
                  return []
          
          def main():
              news = fetch_36kr_news()
              
              # Unicode for Chinese: 姣忔棩璐㈢粡蹇
              title = "\ud83d\udcca \u6bcf\u65e5\u8d22\u7ecf\u5feb\u8baf"
              
              if news:
                  lines = [title, ""]
                  for i, item in enumerate(news[:8], 1):
                      lines.append(f"{i}. {item['title']}")
                  lines.append("")
                  lines.append("\u6765\u6e90\uff1a36\u6c2a")  # 鏉ユ簮锛?6姘?                  message = "\n".join(lines)
              else:
                  message = f"{title}\n\n\u6682\u65e0\u65b0\u95fb\u6570\u636e"  # 鏆傛棤鏂伴椈鏁版嵁
              
              payload = {
                  "msg_type": "text",
                  "content": {"text": message}
              }
              
              webhook = os.environ['FEISHU_WEBHOOK']
              data = json.dumps(payload).encode('utf-8')
              
              req = urllib.request.Request(
                  webhook,
                  data=data,
                  headers={'Content-Type': 'application/json'},
                  method='POST'
              )
              
              with urllib.request.urlopen(req) as response:
                  print(response.read().decode())
          
          if __name__ == "__main__":
              main()
          EOF
