name: Daily AI News

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Send news to Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          SILICON_API_KEY: ${{ secrets.SILICON_API_KEY }}
        run: |
          curl -s "https://www.36kr.com/feed-newsflash" | grep -oP '(?<=<title>)[^<]+' | head -15 > titles.txt
          
          NEWS=$(cat titles.txt | head -10 | sed 's/^/- /' | tr '\n' '\n')
          
          curl -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\": \"text\", \"content\": {\"text\": \"й¦ѓжђі е§Јеї”жЈ©з’ђг€ўзІЎи№‡о‚Ґо††\\n\\n$NEWS\"}}"
