name: Daily AI News
on:
  workflow_dispatch:
  schedule:
    - cron: '30 22 * * *'
jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send to Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          curl -X POST "$FEISHU_WEBHOOK" -H "Content-Type: application/json" -d '{"msg_type":"text","content":{"text":"Test from GitHub Actions"}}'
