name: Daily AI News
on:
  workflow_dispatch:
  schedule:
    - cron: '30 22 * * *'
jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send news to Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python3 send_news.py
