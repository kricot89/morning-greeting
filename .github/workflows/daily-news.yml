name: Daily AI News

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Send news to Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          # Create message with proper encoding
          MESSAGE=$(echo -e '\U1F4CA Daily Finance AI News\n\nNews feature coming soon!')
          
          # Use Python to create properly encoded JSON
          python3 -c "
import json
import sys
import os

message = os.environ.get('MSG', 'Test message')
data = {'msg_type': 'text', 'content': {'text': message}}
print(json.dumps(data, ensure_ascii=False))
" > /tmp/payload.json
          
          curl -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json
        env:
          MSG: "馃搳 Daily Finance AI News\n\nNews feature coming soon!"
