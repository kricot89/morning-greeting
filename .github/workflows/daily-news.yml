name: Daily AI News

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch and send news
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          # Get 36kr news
          NEWS=$(curl -s "https://www.36kr.com/feed-newsflash" | grep -oP '(?<=<title>)[^<]+' | tail -n +2 | head -10 | sed 's/^/- /')
          
          # Send to Feishu
          MESSAGE=$(echo -e "й¦ѓжђі е§Јеї”жЈ©з’ђг€ўзІЎи№‡о‚Ґо††\\n\\n$NEWS")
          
          curl -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\": \"text\", \"content\": {\"text\": \"$MESSAGE\"}}"
