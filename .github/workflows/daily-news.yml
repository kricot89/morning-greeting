name: Daily AI News
on:
  workflow_dispatch:
  schedule:
    - cron: '30 22 * * *'
jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send news to Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python3 << 'EOF'
          import json
          import urllib.request
          import os
          
          # Use Unicode escape sequences for Chinese characters
          # 濮ｅ繑妫╃拹銏㈢病AI閺備即妞堥幗妯款洣 = \u6bcf\u65e5\u8d22\u7ecfAI\u65b0\u95fb\u6458\u8981
          # 閺備即妞堥崝鐔诲厴瀵偓閸欐垳鑵戦敍灞炬殮鐠囬攱婀″鍜冪磼 = \u65b0\u95fb\u529f\u80fd\u5f00\u53d1\u4e2d\uff0c\u656c\u8bf7\u671f\u5f85\uff01
          
          title = "\ud83d\udcca \u6bcf\u65e5\u8d22\u7ecfAI\u65b0\u95fb\u6458\u8981"
          body = "\u65b0\u95fb\u529f\u80fd\u5f00\u53d1\u4e2d\uff0c\u656c\u8bf7\u671f\u5f85\uff01"
          message = f"{title}\n\n{body}"
          
          payload = {
              "msg_type": "text",
              "content": {
                  "text": message
              }
          }
          
          webhook = os.environ['FEISHU_WEBHOOK']
          data = json.dumps(payload).encode('utf-8')
          
          req = urllib.request.Request(
              webhook,
              data=data,
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          
          with urllib.request.urlopen(req) as response:
              print(response.read().decode())
          EOF
